name: Build & Deploy Landing

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --progress=plain \
            --build-arg PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }} \
            --build-arg PUBLIC_DASHBOARD_URL=${{ secrets.PUBLIC_DASHBOARD_URL }} \
            --build-arg PUBLIC_USE_API_PROXY=false \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/pixel-desk-landing:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/pixel-desk-landing:latest
